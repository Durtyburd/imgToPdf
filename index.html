<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>PNG Image Viewer</title>
    <style>
        canvas {
            border: 1px solid black;
            max-width: 100%;
        }
    </style>
</head>

<body>
    <canvas id="canvas" width="500" height="500"></canvas>

    <div>
        <input type="file" id="file-input" accept="image/png, image/jpeg">
        <a id="download-link" href="#" download="image.png">Save Image</a>
    </div>

    <script src="docs/assets/js/ImageReader.js"></script>
</body>

</html>
